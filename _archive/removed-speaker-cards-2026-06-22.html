  data-bio="Dr. Dan German is an internationally known and respected Orthodontist, educator and thought leader devoted to solving dental problems using new and better solutions. He served as a Professor of Orthodontics at The Ohio State University College of Dentistry, where he trained post-doctoral residents and was an attending clinical doctor. In 2016, Dr. German used his passion for transforming the delivery of dental care to found orthobrain®. In 2014, Dr. German received The Distinguished Alumni Award from the University of Louisville Orthodontic Department and remains dedicated to the advancement of the specialty. For the past 25 years, he has traveled the world as a keynote speaker, educating on the clinical aspects of orthodontics and practice development to specialists and general practitioners alike. From establishing one of the most successful clear aligner practices in North America to teaching thousands of dental professionals and publishing landmark research articles, Dr. German has dedicated himself to the profession and to world-class patient care."
